name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install --no-package-lock

      - name: Prepare Web Assets
        run: |
          mkdir -p www
          cp index.html www/ 2>/dev/null || true
          cp manifest.json www/ 2>/dev/null || true
          cp *.js www/ 2>/dev/null || true
          cp *.css www/ 2>/dev/null || true

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Initialize Android Platform
        run: npx cap add android

      - name: Sync Assets to Android
        run: npx cap sync android

      - name: Generate All Android Icons with ImageMagick
        run: |
          # Install ImageMagick
          sudo apt-get update && sudo apt-get install -y imagemagick
          # Create all necessary directories
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p android/app/src/main/res/mipmap-${density}dpi
            mkdir -p android/app/src/main/res/mipmap-${density}dpi-v26
            mkdir -p android/app/src/main/res/drawable-${density}dpi
          done
          mkdir -p android/app/src/main/res/drawable-anydpi-v26
          # Generate regular launcher icons
          convert icon-512.png -resize 48x48 android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          convert icon-512.png -resize 72x72 android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert icon-512.png -resize 96x96 android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert icon-512.png -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert icon-512.png -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          # Generate round launcher icons
          cp android/app/src/main/res/mipmap-mdpi/ic_launcher.png android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
          cp android/app/src/main/res/mipmap-hdpi/ic_launcher.png android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          cp android/app/src/main/res/mipmap-xhdpi/ic_launcher.png android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          cp android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          cp android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png
          # Generate adaptive icons (foreground and background)
          convert icon-512.png -resize 108x108 android/app/src/main/res/drawable-anydpi-v26/ic_launcher_foreground.png
          convert -size 108x108 xc:"#FFFFFF" android/app/src/main/res/drawable-anydpi-v26/ic_launcher_background.png
          # Copy adaptive icons to mipmap-*dpi-v26 folders
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            cp android/app/src/main/res/drawable-anydpi-v26/ic_launcher_foreground.png android/app/src/main/res/mipmap-${density}dpi-v26/ic_launcher_foreground.png
            cp android/app/src/main/res/drawable-anydpi-v26/ic_launcher_background.png android/app/src/main/res/mipmap-${density}dpi-v26/ic_launcher_background.png
          done

      - name: Build APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Rename APK
        run: |
          cd android/app/build/outputs/apk/debug
          mv app-debug.apk AirHockey-PRO-debug.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AirHockey-PRO-Debug
          path: android/app/build/outputs/apk/debug/AirHockey-PRO-debug.apk
