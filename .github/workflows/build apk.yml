name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install --no-package-lock --ignore-scripts

      - name: Prepare Web Assets
        run: |
          mkdir -p www
          cp index.html www/
          cp manifest.json www/
          cp icon-192.png www/
          cp icon-512.png www/

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Sync Assets to Android
        run: npx cap sync android

      - name: Install Pillow
        run: pip install Pillow

      - name: Generate Android Launcher Icons
        run: |
          python3 << 'EOF'
          from PIL import Image, ImageDraw
          import os

          src = Image.open('icon-512.png').convert('RGBA')
          base = 'android/app/src/main/res'

          # Standard launcher icon sizes
          sizes = {
              'mipmap-mdpi':    48,
              'mipmap-hdpi':    72,
              'mipmap-xhdpi':   96,
              'mipmap-xxhdpi':  144,
              'mipmap-xxxhdpi': 192,
          }

          # Adaptive foreground sizes (108dp canvas per density)
          fg_sizes = {
              'mipmap-mdpi':    108,
              'mipmap-hdpi':    162,
              'mipmap-xhdpi':   216,
              'mipmap-xxhdpi':  324,
              'mipmap-xxxhdpi': 432,
          }

          for folder, size in sizes.items():
              path = os.path.join(base, folder)
              os.makedirs(path, exist_ok=True)

              # ic_launcher (square)
              icon = src.resize((size, size), Image.LANCZOS)
              icon.save(os.path.join(path, 'ic_launcher.png'))

              # ic_launcher_round (circle crop)
              circle_img = Image.new('RGBA', (size, size), (0, 0, 0, 0))
              mask = Image.new('L', (size, size), 0)
              draw = ImageDraw.Draw(mask)
              draw.ellipse((0, 0, size-1, size-1), fill=255)
              icon_copy = src.resize((size, size), Image.LANCZOS)
              circle_img.paste(icon_copy, mask=mask)
              circle_img.save(os.path.join(path, 'ic_launcher_round.png'))

              # ic_launcher_foreground (adaptive icon layer)
              fg_size = fg_sizes[folder]
              fg = Image.new('RGBA', (fg_size, fg_size), (0, 0, 0, 0))
              icon_size = int(fg_size * 0.667)
              icon_fg = src.resize((icon_size, icon_size), Image.LANCZOS)
              offset = (fg_size - icon_size) // 2
              fg.paste(icon_fg, (offset, offset))
              fg.save(os.path.join(path, 'ic_launcher_foreground.png'))

              print(f'{folder}: {size}px OK')

          print('All Android icons generated!')
          EOF

      - name: Build APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Rename APK
        run: |
          cd android/app/build/outputs/apk/debug
          mv app-debug.apk AirHockey-PRO-debug.apk || true

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AirHockey-PRO-Debug
          path: android/app/build/outputs/apk/debug/AirHockey-PRO-debug.apk
