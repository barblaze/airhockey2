name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install --no-package-lock

      - name: Prepare Web Assets
        run: |
          mkdir -p www
          cp index.html www/ 2>/dev/null || true
          cp manifest.json www/ 2>/dev/null || true
          cp *.js www/ 2>/dev/null || true
          cp *.css www/ 2>/dev/null || true

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Initialize Android Platform
        run: npx cap add android

      - name: Sync Assets to Android
        run: npx cap sync android

      - name: Copy Icons to Android
        run: |
          # Copy icons directly to mipmap folders
          cp icon-512.png android/app/src/main/res/mipmap-hdpi/ic_launcher.png 2>/dev/null || true
          cp icon-512.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png 2>/dev/null || true
          cp icon-512.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png 2>/dev/null || true
          cp icon-512.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png 2>/dev/null || true
          cp icon-512.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png 2>/dev/null || true
          # Copy as round icons
          cp icon-512.png android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png 2>/dev/null || true
          cp icon-512.png android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png 2>/dev/null || true
          cp icon-512.png android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png 2>/dev/null || true
          cp icon-512.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png 2>/dev/null || true
          cp icon-512.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png 2>/dev/null || true

      - name: Build APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Rename APK
        run: |
          cd android/app/build/outputs/apk/debug
          mv app-debug.apk AirHockey-PRO-debug.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AirHockey-PRO-Debug
          path: android/app/build/outputs/apk/debug/AirHockey-PRO-debug.apk
